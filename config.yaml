paths:
  models_dir: /home/kindlyaccept/emotion_robot/Data/Models
  tts_dir: /home/kindlyaccept/emotion_robot/Data/Models/piper_semaine
models:
  llm: qwen2.5-instruct:1.5b
  llm_api_url: http://localhost:11434
  # Available models via hailo-ollama (use model name as llm value):
  #   llama3.2:3b            (current)
  #   qwen2.5-instruct:1.5b
  #   qwen2:1.5b
  #   qwen2.5-coder:1.5b
  #   deepseek-r1-distill-qwen:1.5b
  # hailo-ollama runs on port 11434 (changed from default 8000 to avoid conflict with web monitor)
  embedding: /home/kindlyaccept/emotion_robot/Data/Models/LLMs/Qwen3-Embedding-0.6B-Q8_0.gguf
  whisper: /home/kindlyaccept/emotion_robot/Data/Models/whisper-base
  hubert: /home/kindlyaccept/emotion_robot/Data/Models/hubert-emotion
  fer: /home/kindlyaccept/emotion_robot/Data/Models/enet/enet_b0_8_va_mtl.onnx
audio:
  device: plughw:CARD=CARD,DEV=0
  rate: 16000
  channels: 1
  vad_threshold: 500
  silence_duration: 1.0
asr:
  compute_type: int8
  language: en
  beam_size: 5
  vad_filter: true
ser:
  sample_rate: 16000
vision:
  width: 1280
  height: 720
  framerate: 30
  face:
    confidence_threshold: 0.6
    nms_threshold: 0.3
  fer:
    ema_alpha: 0.25
    confirm_frames: 4
    switch_threshold: 0.2
    min_confidence: 0.5
fusion:
  ser_weight: 0.4
  fer_weight: 0.6
  ser_max_age_s: 3.0
  fer_max_age_s: 2.0
streaming:
  enabled: true
  pre_speech_ms: 200
  start_speech_ms: 200
  end_silence_ms: 600
  min_speech_ms: 300
  max_utterance_s: 8.0
llm:
  max_tokens: 100
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  repeat_penalty: 1.1
  prompt:
    system_part: 'You are a friendly robot talking to a child. Start your reply with
      a single tone tag in brackets.

      Tone options: [cheerful] [excited] [comforting] [gentle] [calm] [neutral]

      IMPORTANT RULES:
      - Keep your reply to 1-2 short sentences (very brief)
      - Use simple words
      - End with a simple question
      - Be warm and encouraging'
    emotion_prefix: 'The child feels: {emotion_desc}


      '
    history_format: '{role}: {content}

      '
    user_prefix: 'Child: '
    assistant_prefix: 'Robot: ['
tts:
  voice_name: en_GB-semaine-medium
web:
  enabled: true
  base_url: http://127.0.0.1:8000
  timeout_s: 0.8
  frame_fps: 5
  jpeg_quality: 50
